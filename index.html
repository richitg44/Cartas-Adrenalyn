<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Adrenalyn XL LaLiga 2025-26 · Mi colección</title>

    <!-- Tailwind CSS (modo Play, sin build) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Resuelve los imports "react", "react-dom/client" y "lucide-react" -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react"
        }
      }
    </script>

    <!-- Babel Standalone transpila el JSX directamente en el navegador -->
    <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

    <style>
      html, body, #root { height: 100%; }
      body { background: #020617; }
    </style>
  </head>
  <body class="bg-slate-950">
    <div id="root"></div>

    <!--
      Carga index.jsx, lo transpila y lo ejecuta como módulo ES.
      El propio index.jsx monta la App en #root.
    -->
    <script type="text/babel" data-type="module" data-presets="react" src="./index.jsx"></script>

    <noscript>
      <div style="color:#e2e8f0;padding:2rem;text-align:center;font-family:sans-serif">
        Esta app necesita JavaScript activado.
      </div>
    </noscript>
  </body>
</html>
